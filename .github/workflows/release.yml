name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: Release version to package, without a leading v. Use the winghostty fork scheme such as 1.3.100
        required: true
        type: string
      prerelease:
        description: Publish the manual build as a prerelease
        required: false
        default: true
        type: boolean

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  windows-release:
    name: Windows Release
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      WINGET_PACKAGE_IDENTIFIER: ${{ vars.WINGET_PACKAGE_IDENTIFIER }}
      SCOOP_BUCKET_REPO: ${{ vars.SCOOP_BUCKET_REPO }}
      SCOOP_BUCKET_BRANCH: ${{ vars.SCOOP_BUCKET_BRANCH }}
      SCOOP_BUCKET_MANIFEST_PATH: ${{ vars.SCOOP_BUCKET_MANIFEST_PATH }}

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        with:
          version: 0.15.2

      - name: Resolve release metadata
        id: meta
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "push") {
            $tag = "${{ github.ref_name }}"
            $version = $tag.TrimStart('v')
            $prerelease = "false"
          } else {
            $version = "${{ inputs.version }}"
            $tag = "v$version"
            $prerelease = "${{ inputs.prerelease }}"
          }

          $versionMatch = [regex]::Match($version, '^(?<major>\d+)\.(?<minor>\d+)\.(?<patch>\d+)$')
          if (-not $versionMatch.Success) {
            throw "Unsupported release version format '$version'. winghostty releases must use plain semver <major>.<minor>.<patch>."
          }

          $releaseMetaPath = Join-Path $PWD "dist/windows/release-metadata.json"
          if (-not (Test-Path -LiteralPath $releaseMetaPath)) {
            throw "Release metadata file not found: $releaseMetaPath"
          }

          $releaseMeta = Get-Content -LiteralPath $releaseMetaPath -Raw | ConvertFrom-Json
          $upstreamBaseVersion = [string]$releaseMeta.upstreamBaseVersion
          $firstForkPatch = [int]$releaseMeta.firstForkPatch
          $upstreamMatch = [regex]::Match($upstreamBaseVersion, '^(?<major>\d+)\.(?<minor>\d+)\.(?<patch>\d+)$')
          if (-not $upstreamMatch.Success) {
            throw "dist/windows/release-metadata.json must declare a plain semver upstreamBaseVersion."
          }

          $versionLine = "$($versionMatch.Groups['major'].Value).$($versionMatch.Groups['minor'].Value)"
          $upstreamLine = "$($upstreamMatch.Groups['major'].Value).$($upstreamMatch.Groups['minor'].Value)"
          if ($versionLine -ne $upstreamLine) {
            throw "Release version '$version' is on line $versionLine but upstreamBaseVersion '$upstreamBaseVersion' is on line $upstreamLine."
          }

          $patch = [int]$versionMatch.Groups['patch'].Value
          if ($patch -lt $firstForkPatch) {
            throw "Release patch '$patch' is below the configured firstForkPatch '$firstForkPatch'. winghostty fork releases on line $versionLine must start at $versionLine.$firstForkPatch or later."
          }

          "tag=$tag" >> $env:GITHUB_OUTPUT
          "version=$version" >> $env:GITHUB_OUTPUT
          "prerelease=$prerelease" >> $env:GITHUB_OUTPUT
          "title=winghostty $version" >> $env:GITHUB_OUTPUT
          "version_line=$versionLine" >> $env:GITHUB_OUTPUT
          "upstream_base_version=$upstreamBaseVersion" >> $env:GITHUB_OUTPUT
          "first_fork_patch=$firstForkPatch" >> $env:GITHUB_OUTPUT

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Run targeted tests
        shell: pwsh
        run: |
          zig build test -Dtest-filter=win32
          zig build test -Dtest-filter=scroll
          zig build test -Dtest-filter=keybind

      - name: Package Windows artifacts
        shell: pwsh
        run: >
          powershell -ExecutionPolicy Bypass -File scripts/package-windows.ps1
          -Version ${{ steps.meta.outputs.version }}
          -RequireInstaller

      - name: Generate package manager metadata
        shell: pwsh
        run: >
          powershell -ExecutionPolicy Bypass -File scripts/package-package-managers.ps1
          -Version ${{ steps.meta.outputs.version }}
          -Tag ${{ steps.meta.outputs.tag }}
          -Repo ${{ github.repository }}
          -UpstreamBaseVersion ${{ steps.meta.outputs.upstream_base_version }}
          -FirstForkPatch ${{ steps.meta.outputs.first_fork_patch }}

      - name: Publish GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $tag = "${{ steps.meta.outputs.tag }}"
          $version = "${{ steps.meta.outputs.version }}"
          $title = "${{ steps.meta.outputs.title }}"
          $versionLine = "${{ steps.meta.outputs.version_line }}"
          $upstreamBaseVersion = "${{ steps.meta.outputs.upstream_base_version }}"
          $artifactDir = Join-Path $PWD "dist/artifacts/winghostty-$version-windows-x64"
          $assets = @(
            (Join-Path $artifactDir "winghostty-$version-windows-x64-setup.exe"),
            (Join-Path $artifactDir "winghostty-$version-windows-x64-portable.zip"),
            (Join-Path $artifactDir "SHA256SUMS.txt"),
            (Join-Path $artifactDir "winghostty-icon.svg")
          )
          $notesPrefix = @"
          Compatibility line: Ghostty $versionLine
          Base upstream release: $upstreamBaseVersion
          Versioning: major.minor follow the Ghostty upstream line; patch is the winghostty release number on that line.
          "@

          & gh release view $tag *> $null
          if ($LASTEXITCODE -ne 0) {
            $extra = @()
            if ("${{ steps.meta.outputs.prerelease }}" -eq "true") {
              $extra += "--prerelease"
            }
            & gh release create $tag --title $title --generate-notes --notes $notesPrefix @extra @assets
          } else {
            & gh release edit $tag --title $title
            & gh release upload $tag @assets --clobber
          }

      - name: Publish Scoop manifest
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.SCOOP_BUCKET_TOKEN }}
        run: |
          if (-not $env:GH_TOKEN) {
            Write-Host "Skipping Scoop publish: SCOOP_BUCKET_TOKEN is not configured."
            return
          }

          if (-not $env:SCOOP_BUCKET_REPO) {
            Write-Host "Skipping Scoop publish: SCOOP_BUCKET_REPO is not configured."
            return
          }

          $version = "${{ steps.meta.outputs.version }}"
          $artifactDir = Join-Path $PWD "dist/artifacts/winghostty-$version-windows-x64"
          $metadataPath = Join-Path $artifactDir "package-managers/metadata.json"
          $metadata = Get-Content -LiteralPath $metadataPath -Raw | ConvertFrom-Json
          $manifestRelPath = if ($env:SCOOP_BUCKET_MANIFEST_PATH) {
            $env:SCOOP_BUCKET_MANIFEST_PATH
          } else {
            "bucket/winghostty.json"
          }

          $bucketDir = Join-Path $env:RUNNER_TEMP "winghostty-scoop-bucket"
          if (Test-Path -LiteralPath $bucketDir) {
            Remove-Item -LiteralPath $bucketDir -Recurse -Force
          }

          $cloneArgs = @("repo", "clone", $env:SCOOP_BUCKET_REPO, $bucketDir, "--", "--depth", "1")
          if ($env:SCOOP_BUCKET_BRANCH) {
            $cloneArgs += @("--branch", $env:SCOOP_BUCKET_BRANCH)
          }
          & gh @cloneArgs
          if ($LASTEXITCODE -ne 0) {
            throw "Failed to clone Scoop bucket repo $($env:SCOOP_BUCKET_REPO)."
          }

          $destManifestPath = Join-Path $bucketDir $manifestRelPath
          $destManifestDir = Split-Path -Parent $destManifestPath
          New-Item -ItemType Directory -Path $destManifestDir -Force | Out-Null
          Copy-Item -LiteralPath $metadata.scoop.manifestPath -Destination $destManifestPath -Force

          Push-Location $bucketDir
          try {
            & git config user.name "github-actions[bot]"
            & git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            & git add -- $manifestRelPath
            & git diff --cached --quiet --exit-code
            if ($LASTEXITCODE -eq 0) {
              Write-Host "Scoop manifest is unchanged; skipping push."
              return
            }
            if ($LASTEXITCODE -ne 1) {
              throw "git diff --cached failed with exit code $LASTEXITCODE"
            }

            & git commit -m "winghostty: update to $version"
            if ($LASTEXITCODE -ne 0) {
              throw "git commit failed with exit code $LASTEXITCODE"
            }

            & git push origin HEAD
            if ($LASTEXITCODE -ne 0) {
              throw "git push failed with exit code $LASTEXITCODE"
            }
          }
          finally {
            Pop-Location
          }

      - name: Submit WinGet manifest update
        shell: pwsh
        env:
          WINGETCREATE_TOKEN: ${{ secrets.WINGETCREATE_TOKEN }}
        run: |
          if (-not $env:WINGETCREATE_TOKEN) {
            Write-Host "Skipping WinGet submit: WINGETCREATE_TOKEN is not configured."
            return
          }

          if (-not $env:WINGET_PACKAGE_IDENTIFIER) {
            Write-Host "Skipping WinGet submit: WINGET_PACKAGE_IDENTIFIER is not configured. Initial WinGet bootstrap is still manual."
            return
          }

          $version = "${{ steps.meta.outputs.version }}"
          $artifactDir = Join-Path $PWD "dist/artifacts/winghostty-$version-windows-x64"
          $metadataPath = Join-Path $artifactDir "package-managers/metadata.json"
          $metadata = Get-Content -LiteralPath $metadataPath -Raw | ConvertFrom-Json
          $vcLibsPath = Join-Path $env:TEMP "Microsoft.VCLibs.x64.14.00.Desktop.appx"
          $bundlePath = Join-Path $env:TEMP "wingetcreate.msixbundle"
          Import-Module Appx -UseWindowsPowerShell -ErrorAction Stop
          Invoke-WebRequest -Uri "https://aka.ms/Microsoft.VCLibs.x64.14.00.Desktop.appx" -OutFile $vcLibsPath -ErrorAction Stop
          Add-AppxPackage -Path $vcLibsPath -ErrorAction Stop
          Invoke-WebRequest -Uri "https://aka.ms/wingetcreate/latest/msixbundle" -OutFile $bundlePath -ErrorAction Stop
          Add-AppxPackage -Path $bundlePath -ErrorAction Stop

          & wingetcreate update $env:WINGET_PACKAGE_IDENTIFIER `
            --version $version `
            --urls $metadata.winget.installerUrl `
            --release-notes-url $metadata.release.releaseUrl `
            --submit `
            --no-open `
            --token $env:WINGETCREATE_TOKEN
          if ($LASTEXITCODE -ne 0) {
            throw "wingetcreate update failed with exit code $LASTEXITCODE"
          }
